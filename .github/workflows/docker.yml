name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ================= BACKEND =================

      # AMD64
      - name: Build Backend AMD64
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          tags: |
            ahamednazeer/automated-architecture-design:be-latest
            ahamednazeer/automated-architecture-design:be-${{ github.sha }}

      # ARM64
      - name: Build Backend ARM64
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ahamednazeer/automated-architecture-design:be-arm64-latest
            ahamednazeer/automated-architecture-design:be-arm64-${{ github.sha }}

      # ================= FRONTEND =================

      # AMD64
      - name: Build Frontend AMD64
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          tags: |
            ahamednazeer/automated-architecture-design:fe-latest
            ahamednazeer/automated-architecture-design:fe-${{ github.sha }}

      # ARM64
      - name: Build Frontend ARM64
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ahamednazeer/automated-architecture-design:fe-arm64-latest
            ahamednazeer/automated-architecture-design:fe-arm64-${{ github.sha }}